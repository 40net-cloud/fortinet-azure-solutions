name: '[FGT] Azure Marketplace version update legacy'

on:
  workflow_dispatch:

  schedule:
    - cron:  '00 22 * * 0'

env:
  PRODUCT: FortiGate
  PRODUCTSHORT: FGT
  PRODUCTOFFER: fortinet_fortigate-vm_v5
  PRODUCTSKU_X64: fortinet_fg-vm
  PRODUCTSKU_X64_G2: fortinet_fg-vm_g2
  PRODUCTSKU_ARM64: fortinet_fg-vm_arm64

jobs:
  ARM-FGT-Version-Update:
    name: Update FGT version list
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Azure Login via Az module
      uses: azure/login@v3
      with:
        creds: ${{secrets.AZURE_CREDENTIALS}}
        enable-AzPSSession: true

    - name: Verify FGT published version, update templates when new version found
      shell: pwsh
      run: |
        function Sort-Versions {
          param (
            [string[]]$Versions
          )
          $parsedVersions = $Versions | ForEach-Object {
            $versionParts = $_ -split '\.'
            [pscustomobject]@{
              Major = [int]$versionParts[0]
              Minor = [int]$versionParts[1]
              Patch = [int]$versionParts[2]
              FullVersion = $_
            }
          }
          $sortedVersions = $parsedVersions | Sort-Object -Property Major, Minor, Patch -Descending
          $sortedVersions.FullVersion
        }
        $buildingBlocks = @("A-Single-VM", "Active-Active-ELB-ILB","Active-Passive-ELB-ILB","Active-Passive-SDN")
        $marketplaceVersions_x64 = @()
        $marketplaceVersionsUI_x64 = @()
        $marketplaceVersions_x64_g2 = @()
        $marketplaceVersionsUI_x64_g2 = @()
        $marketplaceVersions_arm64 = @()
        $marketplaceVersionsUI_arm64 = @()

        # Get all marketplace versions for x64
        $marketplaceVersions_x64 = @("latest") + $(Sort-Versions($(Get-AzVMImage -PublisherName "fortinet" -Location eastus -Offer "${env:PRODUCTOFFER}" -sku "${env:PRODUCTSKU_X64}").Version))
        $marketplaceVersions_x64 | ConvertTo-Json | Out-File -Filepath "./fgtversion_x64.json"
        $marketplaceVersions_x64 | ForEach-Object { $marketplaceVersionsUI_x64 += [pscustomobject]@{label=$_;value=$_} }
        $marketplaceVersionsUI_x64 | ConvertTo-Json | Out-File -Filepath "./fgtversionui_x64.json"

        # Get all marketplace versions for x64_g2
        $allMarketplaceVersions_x64_g2 = @("latest") + $(Sort-Versions($(Get-AzVMImage -PublisherName "fortinet" -Location eastus -Offer "${env:PRODUCTOFFER}" -sku "${env:PRODUCTSKU_X64_G2}").Version))

        # Filter out 7.6.1 and 7.6.2 from the marketplace versions
        $marketplaceVersions_x64_g2 = $allMarketplaceVersions_x64_g2 | Where-Object { $_ -ne "7.6.1" -and $_ -ne "7.6.2" }
        $marketplaceVersions_x64_g2 | ConvertTo-Json | Out-File -Filepath "./fgtversion_x64_g2.json"

        # Build UI version list
        foreach ($version in $marketplaceVersions_x64_g2) {
          # Special mapping for 7.6.100 and 7.6.200
          if ($version -eq "7.6.100") {
            $marketplaceVersionsUI_x64_g2 += [pscustomobject]@{label="7.6.1";value=$version}
          } elseif ($version -eq "7.6.200") {
            $marketplaceVersionsUI_x64_g2 += [pscustomobject]@{label="7.6.2";value=$version}
          } else {
            $marketplaceVersionsUI_x64_g2 += [pscustomobject]@{label=$version;value=$version}
          }
        }
        $marketplaceVersionsUI_x64_g2 | ConvertTo-Json | Out-File -Filepath "./fgtversionui_x64_g2.json"

        # Get all marketplace versions for arm64
        $marketplaceVersions_arm64 = @("latest") + $(Sort-Versions($(Get-AzVMImage -PublisherName "fortinet" -Location eastus -Offer "${env:PRODUCTOFFER}" -sku "${env:PRODUCTSKU_ARM64}").Version))
        $marketplaceVersions_arm64 | ConvertTo-Json | Out-File -Filepath "./fgtversion_arm64.json"
        $marketplaceVersions_arm64 | ForEach-Object { $marketplaceVersionsUI_arm64 += [pscustomobject]@{label=$_;value=$_} }
        $marketplaceVersionsUI_arm64 | ConvertTo-Json | Out-File -Filepath "./fgtversion_arm64_ui.json"

        foreach ($buildingBlock in $buildingBlocks) {
          if (Test-Path -Path "./${env:PRODUCT}/${buildingBlock}/legacy/mainTemplate.json" -PathType Leaf) {
            Get-Content -Raw -Path "./${env:PRODUCT}/${buildingBlock}/legacy/mainTemplate.json" | jq --slurpfile content "./fgtversion_x64.json" '.parameters.fortiGateImageVersion_x64.allowedValues = $content[]' | Set-Content -Path "./${env:PRODUCT}/${buildingBlock}/mainTemplate.json"
            $content = Get-Content "./${env:PRODUCT}/${buildingBlock}/legacy/mainTemplate.json" -Raw
            if (-Not $content -match '(?<=\r\n)\z') {
              "" | Out-File -Append "./${env:PRODUCT}/${buildingBlock}/legacy/mainTemplate.json"
            }
            Get-Content -Raw -Path "./${env:PRODUCT}/${buildingBlock}/legacy/mainTemplate.json" | jq --slurpfile content "./fgtversion_x64_g2.json" '.parameters.fortiGateImageVersion_x64_g2.allowedValues = $content[]' | Set-Content -Path "./${env:PRODUCT}/${buildingBlock}/mainTemplate.json"
            $content = Get-Content "./${env:PRODUCT}/${buildingBlock}/legacy/mainTemplate.json" -Raw
            if (-Not $content -match '(?<=\r\n)\z') {
              "" | Out-File -Append "./${env:PRODUCT}/${buildingBlock}/legacy/mainTemplate.json"
            }
            Get-Content -Raw -Path "./${env:PRODUCT}/${buildingBlock}/legacy/mainTemplate.json" | jq --slurpfile content "./fgtversion_arm64.json" '.parameters.fortiGateImageVersion_arm64.allowedValues = $content[]' | Set-Content -Path "./${env:PRODUCT}/${buildingBlock}/mainTemplate.json"
            $content = Get-Content "./${env:PRODUCT}/${buildingBlock}/legacy/mainTemplate.json" -Raw
            if (-Not $content -match '(?<=\r\n)\z') {
              "" | Out-File -Append "./${env:PRODUCT}/${buildingBlock}/mainTemplate.json"
            }
          }
          if (Test-Path -Path "./${env:PRODUCT}/${buildingBlock}/legacy/azuredeploy.json" -PathType Leaf) {
            Get-Content -Raw -Path "./${env:PRODUCT}/${buildingBlock}/legacy/azuredeploy.json" | jq --slurpfile content "./fgtversion_x64.json" '.parameters.fortiGateImageVersion_x64.allowedValues = $content[]' | Set-Content -Path "./${env:PRODUCT}/${buildingBlock}/azuredeploy.json"
            $content = Get-Content "./${env:PRODUCT}/${buildingBlock}/legacy/azuredeploy.json" -Raw
            if (-Not $content -match '(?<=\r\n)\z') {
              "" | Out-File -Append "./${env:PRODUCT}/${buildingBlock}/legacy/azuredeploy.json"
            }
            Get-Content -Raw -Path "./${env:PRODUCT}/${buildingBlock}/legacy/azuredeploy.json" | jq --slurpfile content "./fgtversion_x64_g2.json" '.parameters.fortiGateImageVersion_x64_g2.allowedValues = $content[]' | Set-Content -Path "./${env:PRODUCT}/${buildingBlock}/azuredeploy.json"
            $content = Get-Content "./${env:PRODUCT}/${buildingBlock}/legacy/azuredeploy.json" -Raw
            if (-Not $content -match '(?<=\r\n)\z') {
              "" | Out-File -Append "./${env:PRODUCT}/${buildingBlock}/legacy/azuredeploy.json"
            }
            Get-Content -Raw -Path "./${env:PRODUCT}/${buildingBlock}/legacy/azuredeploy.json" | jq --slurpfile content "./fgtversion_arm64.json" '.parameters.fortiGateImageVersion_arm64.allowedValues = $content[]' | Set-Content -Path "./${env:PRODUCT}/${buildingBlock}/azuredeploy.json"
            $content = Get-Content "./${env:PRODUCT}/${buildingBlock}/legacy/azuredeploy.json" -Raw
            if (-Not $content -match '(?<=\r\n)\z') {
              "" | Out-File -Append "./${env:PRODUCT}/${buildingBlock}/legacy/azuredeploy.json"
            }
          }
          if (Test-Path -Path "./${env:PRODUCT}/${buildingBlock}/legacy/createUiDefinition.json" -PathType Leaf) {
            Get-Content -Raw -Path "./${env:PRODUCT}/${buildingBlock}/legacy/createUiDefinition.json" | jq --slurpfile content "./fgtversionui_x64.json" '(.parameters.steps[].elements[] | select( .name == "instancetype_x64") | .elements[] | select( .name == "fortiGateImageVersion_x64") | .constraints.allowedValues) |= $content[]' | Set-Content -Path "./${env:PRODUCT}/${buildingBlock}/createUiDefinition.json"
            $content = Get-Content "./${env:PRODUCT}/${buildingBlock}/legacy/createUiDefinition.json" -Raw
            if (-Not $content -match '(?<=\r\n)\z') {
              "" | Out-File -Append "./${env:PRODUCT}/${buildingBlock}/legacy/createUiDefinition.json"
            }
            Get-Content -Raw -Path "./${env:PRODUCT}/${buildingBlock}/legacy/createUiDefinition.json" | jq --slurpfile content "./fgtversionui_x64_g2.json" '(.parameters.steps[].elements[] | select( .name == "instancetype_x64_g2") | .elements[] | select( .name == "fortiGateImageVersion_x64_g2") | .constraints.allowedValues) |= $content[]' | Set-Content -Path "./${env:PRODUCT}/${buildingBlock}/createUiDefinition.json"
            $content = Get-Content "./${env:PRODUCT}/${buildingBlock}/legacy/createUiDefinition.json" -Raw
            if (-Not $content -match '(?<=\r\n)\z') {
              "" | Out-File -Append "./${env:PRODUCT}/${buildingBlock}/legacy/createUiDefinition.json"
            }
            Get-Content -Raw -Path "./${env:PRODUCT}/${buildingBlock}/legacy/createUiDefinition.json" | jq --slurpfile content "./fgtversion_arm64_ui.json" '(.parameters.steps[].elements[] | select( .name == "instancetype_arm64") | .elements[] | select( .name == "fortiGateImageVersion_arm64") | .constraints.allowedValues) |= $content[]' | Set-Content -Path "./${env:PRODUCT}/${buildingBlock}/createUiDefinition.json"
            $content = Get-Content "./${env:PRODUCT}/${buildingBlock}/legacy/createUiDefinition.json" -Raw
            if (-Not $content -match '(?<=\r\n)\z') {
              "" | Out-File -Append "./${env:PRODUCT}/${buildingBlock}/legacy/createUiDefinition.json"
            }
          }
        }

        Remove-Item "./fgtversion_x64.json"
        Remove-Item "./fgtversionui_x64.json"
        Remove-Item "./fgtversion_x64_g2.json"
        Remove-Item "./fgtversionui_x64_g2.json"
        Remove-Item "./fgtversion_arm64.json"
        Remove-Item "./fgtversion_arm64_ui.json"

    - name: Create Pull Request
      id: cpr
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: Update report
        committer: GitHub <noreply@github.com>
        author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
        signoff: false
        branch: fgt-vm-update-version
        delete-branch: true
        title: '[FGT] Azure Marketplace FGT Version update - legacy'
        body: |
          Update report
          - Updated FGT version in building blocks: "A-Single-VM", "Active-Active-ELB-ILB","Active-Passive-ELB-ILB","Active-Passive-SDN"
          - Auto-generated by [create-pull-request][1]

          [1]: https://github.com/peter-evans/create-pull-request
        labels: |
          report
          automated pr
        assignees: jvhoof
        reviewers: jvhoof
        draft: false
